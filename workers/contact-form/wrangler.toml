name = "contact-form-worker"
main = "index.ts"
compatibility_date = "2024-01-01"

# Route for the worker
routes = [
  { pattern = "contact.chinanewchip.com", zone_name = "chinanewchip.com" },
  { pattern = "chinanewchip.com/contact-form", zone_name = "chinanewchip.com" },
]

# Environment variables (optional, for sensitive data)
[vars]
# These should be set in Cloudflare dashboard for security
# RESEND_API_KEY = "re_xxx"
# TO_EMAIL = "jason@chinanewchip.com"

# Development settings
[dev]
port = 8787
local_protocol = "http"
