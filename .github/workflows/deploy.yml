name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Feishu content
        run: npx tsx scripts/feishu/sync.ts
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_SHEET_PRODUCTS_TOKEN: ${{ secrets.FEISHU_SHEET_PRODUCTS_TOKEN }}
          FEISHU_SHEET_PRODUCTS_ID: ${{ secrets.FEISHU_SHEET_PRODUCTS_ID }}
          FEISHU_SHEET_BRANDS_TOKEN: ${{ secrets.FEISHU_SHEET_BRANDS_TOKEN }}
          FEISHU_SHEET_BRANDS_ID: ${{ secrets.FEISHU_SHEET_BRANDS_ID }}
          FEISHU_SHEET_CROSSREF_TOKEN: ${{ secrets.FEISHU_SHEET_CROSSREF_TOKEN }}
          FEISHU_SHEET_CROSSREF_ID: ${{ secrets.FEISHU_SHEET_CROSSREF_ID }}
          FEISHU_ARTICLE_DOCS: ${{ secrets.FEISHU_ARTICLE_DOCS }}

      - name: Build
        run: npm run build
        env:
          NODE_VERSION: '22'

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tongjing-site
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
